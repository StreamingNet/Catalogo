            inicializarPantalla();
            
            const mensajeGeneral = "Hola quiero mas informacion ¿Pueden ayudarme por favor?";
            document.getElementById("btn-whatsapp-general").href = `https://wa.me/${miNumero}?text=${encodeURIComponent(mensajeGeneral)}`;
        });

        function inicializarPantalla() {
            const menuCategorias = document.getElementById("menu-categorias");
            catalogo.forEach((categoria, index) => {
                const isActive = index === 0 ? "active" : "";
                menuCategorias.innerHTML += `
                    <button class="menu-btn ${isActive}" id="btn-cat-${index}" onclick="mostrarCategoria(${index})">
                        ${categoria.titulo}
                    </button>
                `;
            });

            const divPagos = document.getElementById("contenedor-metodos");
            metodosDePago.forEach(metodo => {
                divPagos.innerHTML += `
                    <button class="payment-method-btn" onclick="enviarPedido('${metodo.nombre}')">
                        <span class="payment-icon">${metodo.icono}</span>
                        <span>${metodo.nombre}</span>
                    </button>
                `;
            });

            mostrarCategoria(0);
        }

        function mostrarCategoria(index) {
            document.querySelectorAll('.menu-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-cat-${index}`).classList.add('active');
            
            const categoria = catalogo[index];
            document.getElementById("titulo-categoria-activa").textContent = categoria.titulo;
            
            const contenedor = document.getElementById("contenedor-productos");
            contenedor.innerHTML = "";
            
            categoria.productos.forEach((prod, prodIndex) => {
                if (prod.mostrar === false) return; 
                
                const badgeOut = prod.disponible ? '' : '<span class="badge-stock">AGOTADO</span>';
                
                let badgeAhorro = '';
                let htmlPrecios = `<div class="price-tag">$${prod.precio.toFixed(2)}</div>`;
                
                if (prod.precioOriginal > prod.precio) {
                    const ahorroNum = (prod.precioOriginal - prod.precio).toFixed(2);
                    badgeAhorro = `<span class="badge-ahorro">Ahorro $${ahorroNum}</span>`;
                    htmlPrecios = `
                        <div class="price-container">
                            <span class="old-price">$${prod.precioOriginal.toFixed(2)}</span>
                            <span class="price-tag">$${prod.precio.toFixed(2)}</span>
                        </div>
                    `;
                }
                
                const iconoReloj = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`;

                contenedor.innerHTML += `
                    <div class="col-6 col-md-6 col-lg-4 col-xl-3">
                        <div class="card card-product ${prod.disponible ? '' : 'card-agotado'}" onclick="${prod.disponible ? `abrirDetalle(${index}, ${prodIndex})` : ''}">
                            ${badgeOut}
                            ${badgeAhorro}
                            <img src="${prod.imagen}" class="card-img-top" alt="${prod.nombre}">
                            <div class="card-body-custom">
                                <span class="duracion-tag">${iconoReloj} ${prod.duracion}</span>
                                <div class="service-name">${prod.nombre}</div>
                                ${htmlPrecios}
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function abrirDetalle(catIndex, prodIndex) {
            catActual = catalogo[catIndex].titulo;
            prodActual = catalogo[catIndex].productos[prodIndex];

            document.getElementById("modal-img").src = prodActual.imagen;
            document.getElementById("modal-title").textContent = prodActual.nombre;
            document.getElementById("modal-cat").textContent = catActual;
            document.getElementById("modal-price").textContent = `$${prodActual.precio.toFixed(2)}`;
            
            const iconoReloj = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:5px; width:14px; height:14px;"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`;
            document.getElementById("modal-duracion").innerHTML = `${iconoReloj} ${prodActual.duracion}`;
            
            const modalOldPrice = document.getElementById("modal-old-price");
            const modalAhorroBadge = document.getElementById("modal-ahorro-badge");
            
            if (prodActual.precioOriginal > prodActual.precio) {
                const ahorroNum = (prodActual.precioOriginal - prodActual.precio).toFixed(2);
                modalOldPrice.textContent = `$${prodActual.precioOriginal.toFixed(2)}`;
                modalOldPrice.style.display = "inline";
                
                modalAhorroBadge.textContent = `¡Ahorras $${ahorroNum}!`;
                modalAhorroBadge.style.display = "block";
            } else {
                modalOldPrice.style.display = "none";
                modalAhorroBadge.style.display = "none";
            }

            document.getElementById("modal-desc").textContent = prodActual.descripcion + terminosGarantia;

            modalProd.show();
        }

        function abrirModalPago() {
            modalProd.hide(); 
            modalPago.show(); 
        }

        function enviarPedido(metodoElegido) {
            const texto = `Hola, quiero comprar *${prodActual.nombre}* a *$${prodActual.precio.toFixed(2)}*.\nCategoría: ${catActual}\nMétodo de pago seleccionado: *${metodoElegido}*`;
            const url = `https://wa.me/${miNumero}?text=${encodeURIComponent(texto)}`;
            
            window.open(url, '_blank');
            modalPago.hide();
        }
